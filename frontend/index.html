<!DOCTYPE html>

<html>
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CodeMorph</title>

    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/javascript/javascript.min.js"></script>

    <style>

      @import url('https://fonts.googleapis.com/css2?family=Kaushan+Script&display=swap');

      #main-font {
        font-family: "Kaushan Script", cursive;
      }

      .CodeMirror {
        border-radius: 0.75rem;
        border: 1px solid rgb(199 210 254);
        margin: 0.75rem;
        flex: 1;
        min-height: 200px;
        font-size: 0.875rem;
      }

      .spinner {
        width: 40px;
        height: 40px;
        border: 4px solid #e5e7eb;
        border-top: 4px solid #6366f1;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      #optimizeBtn {
        font-weight: 600;
        transition: 0.2s ease;
      }

      #optimizeBtn:hover {
        transform: scale(1.05);
      }

    </style>

  </head>

  <body class="bg-gray-50 min-h-screen flex flex-col">

    <h1 class="text-4xl md:text-6xl text-center my-6 md:my-8" id="main-font">
      CodeMorph
    </h1>

    <div id="loader"
      class="hidden fixed inset-0 flex items-center justify-center bg-white/70 z-50">
      <div class="spinner"></div>
    </div>

    <div class="flex flex-col md:flex-row flex-1 box-border p-4 border-2 border-indigo-300 m-4 md:m-7 shadow-xl shadow-indigo-500 rounded-xl gap-6">

      <!-- LEFT SIDE -->

      <div class="flex flex-col w-full md:w-1/2 mb-3">

        <div class="flex flex-col items-left bg-indigo-200 rounded-xl mb-2 w-34">
          <h2 class="font-bold mb-3 text-lg pl-2 pt-2">Program</h2>
        </div>

        <div class="box-border border border-indigo-200 w-full rounded-xl flex flex-col flex-1">

          <div class="flex justify-between items-center px-3 py-2 border-b border-indigo-100">
            <h3 class="font-bold">CODE</h3>
          </div>

          <textarea id="program-input"
            placeholder="Select and Enter your code"></textarea>

        </div>

        <p class="font-bold ml-2 mt-2">
          NOTE : Please ensure that target language is selected to get the output
        </p>

      </div>

      <!-- RIGHT SIDE -->

      <div class="flex flex-col w-full md:w-1/2">

        <!-- LANGUAGE SELECT -->

        <div class="mb-3 mt-12">

          <label for="language"
            class="block mb-1 font-bold text-gray-700">

            Target Language

          </label>

          <select id="language"
            class="w-full rounded-xl bg-indigo-200 border p-2 border-indigo-400 shadow-sm shadow-indigo-400">

            <option selected value="default">SELECT</option>

            <option value="GNU GCC C11 5.1.0">GNU GCC C11 5.1.0</option>
            <option value="GNU G++17 7.3.0">GNU G++17 7.3.0</option>
            <option value="GNU G++20 13.2">GNU G++20 13.2</option>
            <option value="Java 21 64bit">Java 21 64bit</option>
            <option value="Python 3.13">Python 3.13</option>
            <option value="PyPy 3 7.3.15">PyPy 3 7.3.15</option>
            <option value="C# 10 .NET SDK 6.0">C# 10 .NET SDK 6.0</option>
            <option value="JavaScript V8 12.4">JavaScript V8 12.4</option>
            <option value="TypeScript 5.4">TypeScript 5.4</option>
            <option value="Go 1.22.2">Go 1.22.2</option>
            <option value="Rust 1.77.1">Rust 1.77.1</option>
            <option value="Kotlin 1.9.21">Kotlin 1.9.21</option>
            <option value="PHP 8.3">PHP 8.3</option>
            <option value="Ruby 3.3.0">Ruby 3.3.0</option>
            <option value="Swift 5.10">Swift 5.10</option>
            <option value="Perl 5.38">Perl 5.38</option>
            <option value="R 4.3.3">R 4.3.3</option>

          </select>

        </div>

        <!-- OUTPUT SECTION -->

        <div class="box-border border border-indigo-200 w-full rounded-xl flex flex-col flex-1">

          <div class="flex justify-between items-center px-4 py-2 border-b border-indigo-100">

            <h3 class="font-bold">OUTPUT</h3>

            <div class="flex gap-2">

              <button id="optimizeBtn"
                class="px-2 py-1 text-xs bg-yellow-500 text-white rounded hover:bg-yellow-600">
                ⚡ Optimize
              </button>

              <button onclick="copyOutput()"
                class="px-2 py-1 text-xs bg-indigo-600 text-white rounded hover:bg-indigo-700">
                Copy
              </button>

              <button onclick="downloadCode()"
                class="px-2 py-1 text-xs bg-green-600 text-white rounded hover:bg-green-700">
                Download
              </button>

            </div>

          </div>

          <textarea id="outputBox"
            placeholder="Here is your output"
            class="border rounded-xl m-3 flex-1 min-h-[200px] p-3 resize-none"
            readonly></textarea>

        </div>

        <!-- GENERATE BUTTON -->

        <button id="convertBtn"
          onclick="convertCode()"
          class="mt-3 mb-11 w-full h-12 text-white font-semibold bg-gradient-to-r from-indigo-500 via-purple-500 to-pink-500 rounded-full shadow-lg hover:scale-105 duration-200 hover:drop-shadow-2xl hover:shadow-[#7dd3fc]">

          Generate

        </button>

      </div>

    </div>

    <script>

      const programEditor = CodeMirror.fromTextArea(
        document.getElementById("program-input"),
        {
          lineNumbers: true,
          mode: "javascript",
          theme: "default"
        }
      );

      function copyOutput() {

        const output = document.getElementById("outputBox");

        navigator.clipboard.writeText(output.value).then(() => {
          alert("Copied to clipboard!");
        });

      }

      function downloadCode() {

        const code = document.getElementById("outputBox").value;

        const blob = new Blob([code], { type: "text/plain" });

        const link = document.createElement("a");

        link.href = URL.createObjectURL(blob);

        link.download = "converted_code.txt";

        link.click();

      }

      async function convertCode() {

        const code = programEditor.getValue();

        const targetLanguage =
          document.getElementById("language").value;

        const loader = document.getElementById("loader");

        loader.classList.remove("hidden");

        try {

          const response = await fetch(
            "https://codemorph-evv3.onrender.com/convert",
            {
              method: "POST",
              headers: {
                "Content-Type": "application/json"
              },
              body: JSON.stringify({
                code,
                targetLanguage
              })
            }
          );

          if (!response.ok) {
            throw new Error("Server error!");
          }

          const data = await response.json();

          document.getElementById("outputBox").value =
            data.convertedCode;

        } catch (error) {

          document.getElementById("outputBox").value =
            "⚠️ " + error.message;

        }

        loader.classList.add("hidden");

      }

      document.getElementById("optimizeBtn")
      .addEventListener("click", async () => {
          const outputBox =
            document.getElementById("outputBox");
          const code = outputBox.value;
          if (!code.trim()) {
              alert("No code available to optimize.");
              return;
          }
          const btn =
            document.getElementById("optimizeBtn");
          btn.disabled = true;
          btn.innerText = "Optimizing...";
          try {
              const response = await fetch(
                  "https://codemorph-evv3.onrender.com/optimize",
                  {
                      method: "POST",
                      headers: {
                          "Content-Type": "application/json"
                      },
                      body: JSON.stringify({
                          code: code
                      })
                  }
              );
              if (!response.ok) {
                  throw new Error("Optimization failed");
              }
              const data = await response.json();
              outputBox.value = data.optimizedCode;
              btn.innerText = "⚡ Optimized";
          }
          catch(error){
              alert(error.message);
              btn.innerText = "⚡ Optimize";
          }
          btn.disabled = false;
      });

    </script>

  </body>

</html>
